default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: local
    hooks:
      - id: black
        name: black
        entry: black
        language: python
        additional_dependencies: [black==26.3.1]
        types: [python]

      - id: validate-agents
        name: validate-agents
        entry: python .agents/scripts/validate_agents.py
        language: python
        pass_filenames: false
        always_run: true

      - id: check-assessment-coverage
        name: check-assessment-coverage
        entry: python .agents/scripts/check_assessment_coverage.py
        language: python
        pass_filenames: false
        always_run: true

      - id: commitizen-check
        name: commitizen-check
        entry: cz check --allow-abort --commit-msg-file
        language: python
        additional_dependencies: [commitizen==4.13.10]
        stages: [commit-msg]
        always_run: true
