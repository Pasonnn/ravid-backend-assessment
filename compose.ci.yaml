name: ravid-ci

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ravid
      POSTGRES_USER: ravid
      POSTGRES_PASSWORD: ravid
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ravid -d ravid"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 3s

  app:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
    working_dir: /app
    environment:
      DJANGO_SECRET_KEY: ci-secret-key-with-at-least-thirty-two-bytes
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      POSTGRES_DB: ravid
      POSTGRES_USER: ravid
      POSTGRES_PASSWORD: ravid
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
